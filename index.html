
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hakimi Herbal Products | Nature's Potent Remedies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              hakimi: {
                forest: '#1B2B1C',    /* Deep Moss */
                sage: '#627D59',      /* Herbal Sage */
                terracotta: '#B35A38',/* Warm Clay */
                cream: '#FDFBF7',     /* Soft Bone */
                leaf: '#D4E1CF',      /* Pale Sprout */
              }
            },
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              serif: ['Fraunces', 'serif'],
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '3rem',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #FDFBF7;
        color: #1B2B1C;
        scroll-behavior: smooth;
        overflow-x: hidden;
      }
      .font-serif { font-family: 'Fraunces', serif; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      @keyframes logo-reveal {
        0% { opacity: 0; transform: scale(0.9) translateY(10px); filter: blur(8px); }
        100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
      }

      @keyframes text-reveal {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      @keyframes splash-exit {
        0% { opacity: 1; transform: scale(1); filter: blur(0); }
        100% { opacity: 0; transform: scale(1.05); filter: blur(8px); pointer-events: none; }
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-logo-reveal { animation: logo-reveal 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      .animate-text-reveal { animation: text-reveal 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards; }
      .animate-splash-exit { animation: splash-exit 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
      .animate-fade-in-up { animation: fade-in-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
      
      .glass {
        background: rgba(253, 251, 247, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .text-balance { text-wrap: balance; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react-redux": "https://esm.sh/react-redux@^9.2.0",
    "@reduxjs/toolkit": "https://esm.sh/@reduxjs/toolkit@^2.11.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
